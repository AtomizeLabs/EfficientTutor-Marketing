backend:
  name: github
  repo: Atomize-Labs/EfficientTutor-Marketing
  branch: main
  base_url: https://efficienttutor-oauth-gateway.ambadran717.workers.dev

media_folder: "public/assets"
public_folder: "/assets"

collections:
  - name: "content"
    label: "Site Content"
    delete: false # Prevent accidental deletion of the whole file
    files:
      - name: "tutorials"
        label: "Tutorials Hub"
        file: "public/data/tutorials.json"
        description: "Manage the tutorial racks and individual guides"
        fields:
          - label: "Tutorial Topics"
            name: "tutorialTopics"
            widget: "list"
            allow_add: true
            fields:
              - {label: "Topic ID (Slug)", name: "id", widget: "string", hint: "e.g. zoom-integration"}
              - {label: "Topic Title", name: "title", widget: "string", hint: "e.g. Zoom App Integration"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Icon (SVG)", name: "icon", widget: "code", default_language: "html", hint: "Paste Heroicon SVG string here"}
              - label: "Tutorials"
                name: "tutorials"
                widget: "list"
                fields:
                  - {label: "Tutorial ID", name: "id", widget: "string"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}
                  - label: "Videos"
                    name: "videos"
                    widget: "object"
                    fields:
                      - {label: "Desktop YouTube ID", name: "desktop", widget: "string"}
                      - {label: "Mobile YouTube ID", name: "mobile", widget: "string"}
                  - {label: "Step-by-Step Guide", name: "steps", widget: "list", summary: "{{fields.step}}"}
                  - {label: "Troubleshooting Guide (Optional)", name: "troubleshoot", widget: "text", required: false}
                  - {label: "Related Tutorial IDs (Optional)", name: "relatedIds", widget: "list", required: false, hint: "Enter IDs of other tutorials to link to"}
